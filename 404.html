<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#9CAF88">
  <title>404 - Page Not Found | Party Maker</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://www.partymaker.cn/">
  <meta property="og:title" content="Page Not Found | Party Maker">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.partymaker.cn/">
  <style>
    :root {
      --primary: #9CAF88;
      --primary-dark: #4E5E42;
      --text: #4A5A3A;
      --text-light: #627252;
      --bg: #F7F9F5;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 520px; }
    .emoji { font-size: 4rem; margin-bottom: 0.5rem; }
    h1 { font-size: 4.5rem; color: var(--primary); line-height: 1; margin-bottom: 0.75rem; font-weight: 700; }
    h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { color: var(--text-light); margin-bottom: 1.75rem; line-height: 1.7; font-size: 0.95rem; }
    .links { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    a:hover { background: var(--primary-dark); }
    a.outline {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    a.outline:hover { background: var(--primary); color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🎈</div>
    <h1>404</h1>
    <h2>Oops! This page doesn't exist.</h2>
    <p>It might have been moved or the URL might be incorrect. Let's get you back to our party supplies.</p>
    <div class="links">
      <a href="https://www.partymaker.cn/">Back to Home</a>
      <a href="https://www.partymaker.cn/ramadan/" class="outline">Ramadan Collection</a>
    </div>
  </div>
</body>
</html>
